<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldPulse — Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    cursor: none;
  }

  /* BACKGROUND IMAGE */
  .bg {
    position: fixed; inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 1.5s ease;
    z-index: 0;
  }
  .bg-a { opacity: 1; }
  .bg-b { opacity: 0; }

  /* CINEMATIC OVERLAYS */
  .overlay-top {
    position: fixed; top: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
    z-index: 1; pointer-events: none;
  }
  .overlay-bottom {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 60%;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
    z-index: 1; pointer-events: none;
  }
  .overlay-left {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 30%;
    background: linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 100%);
    z-index: 1; pointer-events: none;
  }

  /* DASHBOARD */
  .dashboard {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 44px 56px;
  }

  /* TOP ROW */
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  /* BRAND */
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon {
    width: 42px; height: 42px;
    background: #ff2233;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue'; font-size: 22px; color: white;
    letter-spacing: 1px;
  }
  .brand-text { }
  .brand-name {
    font-family: 'Bebas Neue';
    font-size: 26px; letter-spacing: 5px; color: white;
  }
  .brand-sub {
    font-size: 10px; color: rgba(255,255,255,0.5);
    letter-spacing: 3px; text-transform: uppercase; margin-top: 1px;
  }

  /* WEATHER TOP RIGHT */
  .weather-widget {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 16px 24px;
    text-align: right;
    min-width: 200px;
  }
  .weather-temp {
    font-family: 'Bebas Neue';
    font-size: 52px; line-height: 1; color: white;
  }
  .weather-row {
    display: flex; justify-content: flex-end;
    align-items: center; gap: 8px; margin-top: 4px;
  }
  .weather-city {
    font-size: 11px; color: rgba(255,255,255,0.6);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .weather-desc {
    font-size: 13px; color: rgba(255,255,255,0.8);
  }

  /* MIDDLE — TIME */
  .middle {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .time-block { }
  .time-main {
    font-family: 'Bebas Neue';
    font-size: clamp(130px, 19vw, 240px);
    line-height: 0.85;
    color: white;
    text-shadow: 0 4px 40px rgba(0,0,0,0.4);
    letter-spacing: -3px;
    animation: fadeUp 1s ease both;
  }
  .time-date {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 18px;
    font-weight: 300;
    animation: fadeUp 1s ease 0.2s both;
  }

  /* RIGHT SIDE CARDS */
  .side-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 320px;
    animation: fadeLeft 1s ease 0.3s both;
  }

  .glass-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px;
    padding: 18px 22px;
  }

  .card-label {
    font-size: 10px; color: rgba(255,255,255,0.45);
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px;
  }
  .card-value {
    font-size: 26px; font-weight: 600; color: white; line-height: 1;
  }
  .card-sub {
    font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 3px;
  }

  .quote-glass {
    background: rgba(255,34,51,0.15);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,34,51,0.3);
    border-radius: 18px;
    padding: 18px 22px;
  }
  .quote-line {
    width: 28px; height: 3px;
    background: #ff2233; border-radius: 2px; margin-bottom: 10px;
  }
  .quote-txt {
    font-size: 14px; color: rgba(255,255,255,0.8);
    line-height: 1.6; font-weight: 300; font-style: italic;
  }

  /* BOTTOM — NEWS */
  .bottom-row {
    animation: fadeUp 1s ease 0.4s both;
  }

  .news-meta {
    display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
  }
  .live-pill {
    display: flex; align-items: center; gap: 7px;
    background: #ff2233;
    padding: 5px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 700; color: white;
    letter-spacing: 2px;
  }
  .live-dot {
    width: 7px; height: 7px; background: white;
    border-radius: 50%; animation: blink 1.2s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; } 50% { opacity: 0.2; }
  }
  .news-tag {
    font-size: 11px; color: rgba(255,255,255,0.45);
    letter-spacing: 3px; text-transform: uppercase;
  }
  .news-src {
    margin-left: auto;
    font-size: 11px; color: rgba(255,255,255,0.3);
    letter-spacing: 2px; text-transform: uppercase;
  }

  /* ACCENT LINE */
  .accent-line {
    width: 4px; height: 100%;
    background: #ff2233;
    border-radius: 2px;
    position: absolute; left: 0; top: 0;
  }
  .headline-wrap {
    position: relative; padding-left: 20px;
  }

  .news-headline {
    font-size: clamp(26px, 3.2vw, 44px);
    font-weight: 600; color: white;
    line-height: 1.25; letter-spacing: -0.5px;
    transition: opacity 0.6s ease, transform 0.6s ease;
    min-height: 60px;
  }
  .news-headline.hide {
    opacity: 0; transform: translateY(10px);
  }

  /* PROGRESS */
  .progress-wrap {
    margin-top: 16px;
    height: 2px; background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #ff2233;
    width: 0%; border-radius: 2px;
  }

  /* COUNTER */
  .news-counter {
    position: fixed; bottom: 44px; right: 56px;
    font-family: 'JetBrains Mono'; font-size: 12px;
    color: rgba(255,255,255,0.25); letter-spacing: 2px;
    z-index: 20;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeLeft {
    from { opacity: 0; transform: translateX(24px); }
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<!-- DUAL BACKGROUND for crossfade -->
<div class="bg bg-a" id="bg-a"></div>
<div class="bg bg-b" id="bg-b"></div>

<!-- OVERLAYS -->
<div class="overlay-top"></div>
<div class="overlay-bottom"></div>
<div class="overlay-left"></div>

<!-- DASHBOARD -->
<div class="dashboard">

  <!-- TOP -->
  <div class="top-row">
    <div class="brand">
      <div class="brand-icon">WP</div>
      <div class="brand-text">
        <div class="brand-name">WORLDPULSE</div>
        <div class="brand-sub">Live Intelligence · India</div>
      </div>
    </div>
    <div class="weather-widget">
      <div class="weather-temp" id="w-temp">--°</div>
      <div class="weather-row">
        <div class="weather-desc" id="w-desc">Loading</div>
        <div class="weather-city" id="w-city">JAIPUR</div>
      </div>
    </div>
  </div>

  <!-- MIDDLE -->
  <div class="middle">
    <div class="time-block">
      <div class="time-main" id="clock">00:00</div>
      <div class="time-date" id="dateline">MONDAY · 01 JANUARY 2026</div>
    </div>
    <div class="side-cards">
      <div class="glass-card">
        <div class="card-label">Headlines Loaded</div>
        <div class="card-value" id="headline-count">--</div>
        <div class="card-sub">breaking stories today</div>
      </div>
      <div class="glass-card">
        <div class="card-label">Last Refreshed</div>
        <div class="card-value" id="refresh-time" style="font-size:20px;font-family:'JetBrains Mono'">--:--</div>
        <div class="card-sub">auto-updates every 5 min</div>
      </div>
      <div class="quote-glass">
        <div class="quote-line"></div>
        <div class="quote-txt" id="quote">Loading...</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NEWS -->
  <div class="bottom-row">
    <div class="news-meta">
      <div class="live-pill"><div class="live-dot"></div>LIVE</div>
      <div class="news-tag">INDIA · BREAKING NEWS</div>
      <div class="news-src" id="news-src">—</div>
    </div>
    <div class="headline-wrap">
      <div class="accent-line"></div>
      <div class="news-headline" id="headline">Fetching latest India news...</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="prog"></div>
    </div>
  </div>

</div>

<div class="news-counter" id="counter">01 / --</div>

<script>
// ── CONFIG ───────────────────────────────────────────────
const WEATHER_KEY  = 'YOUR_OPENWEATHER_KEY';
const NEWS_KEY     = '0d646656573d47a996e64c7adf717e37';
const PEXELS_KEY   = 'YOUR_PEXELS_KEY';
const CITY         = 'Jaipur';
const HEADLINE_DUR = 12000; // 12 seconds per headline
const FETCH_INT    = 300000; // 5 min

const QUOTES = [
  "Clarity is power.",
  "Stay hungry. Stay foolish.",
  "Simplicity is the ultimate sophistication.",
  "Think different. The journey is the reward.",
  "Less noise. More signal.",
  "Make something people want.",
  "Your time is limited. Use it well.",
  "Design is not just what it looks like — it's how it works.",
  "Do less. Mean more.",
  "The best way to predict the future is to create it.",
];

const IMPORTANT = ["election","vote","modi","bjp","congress","parliament","minister","government",
  "cricket","t20","ipl","world cup","olympic","championship","tournament","final","match",
  "war","attack","military","army","border","pakistan","china","conflict","terror",
  "economy","stock","market","sensex","nifty","rupee","gdp","budget","finance","bank",
  "space","isro","rocket","satellite","launch","moon","mars","chandrayaan",
  "earthquake","flood","disaster","cyclone","storm","tsunami","emergency",
  "supreme court","verdict","arrest","scam","corruption","protest","riot",
  "nuclear","missile","explosion","accident","crash","death toll",
  "g20","un","summit","agreement","treaty","sanctions"];

const BLOCKED = ["recipe","diet","weight loss","heartburn","skincare","beauty","fashion",
  "makeup","dating","horoscope","quiz","top 10","how to","easy tips","hacks","lifestyle",
  "gossip","wedding","birthday","viral","funny","meme","sponsored","sale","offer","advertisement"];

// Background queries per topic
const BG_QUERIES = {
  cricket: "cricket stadium crowd celebration",
  election: "india parliament aerial city",
  economy: "city skyline night aerial",
  space: "rocket launch night stars",
  disaster: "dramatic storm clouds aerial",
  military: "mountains fog dramatic landscape",
  default: ["golden hour landscape india","dramatic clouds mountains","city lights aerial night","ocean sunset dramatic","misty forest morning"]
};

let headlines = [];
let currentIdx = 0;
let bgActive = 'a';
let progTimer = null;

// ── CLOCK ────────────────────────────────────────────────
function tick() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
  const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const d = String(now.getDate()).padStart(2,'0');
  document.getElementById('dateline').textContent =
    `${DAYS[now.getDay()]}  ·  ${d} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(tick, 1000); tick();

// ── QUOTE ────────────────────────────────────────────────
document.getElementById('quote').textContent = QUOTES[Math.floor(Math.random()*QUOTES.length)];

// ── WEATHER ──────────────────────────────────────────────
async function fetchWeather() {
  if (!WEATHER_KEY || WEATHER_KEY.includes('YOUR')) return;
  try {
    const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_KEY}&units=metric`);
    const d = await r.json();
    document.getElementById('w-temp').textContent = `${Math.round(d.main.temp)}°`;
    document.getElementById('w-desc').textContent = d.weather[0].description;
    document.getElementById('w-city').textContent = CITY.toUpperCase();
  } catch(e) {}
}
fetchWeather();
setInterval(fetchWeather, 600000);

// ── PEXELS BACKGROUND ────────────────────────────────────
async function setBackground(query) {
  if (!PEXELS_KEY || PEXELS_KEY.includes('YOUR')) {
    // Use Unsplash source as fallback (no key needed)
    const fallbacks = [
      'https://picsum.photos/1920/1080?random=1',
      'https://picsum.photos/1920/1080?random=2',
      'https://picsum.photos/1920/1080?random=3',
      'https://picsum.photos/1920/1080?random=4',
    ];
    const url = fallbacks[Math.floor(Math.random()*fallbacks.length)];
    crossfadeBg(url);
    return;
  }
  try {
    const r = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=15&orientation=landscape`, {
      headers: { Authorization: PEXELS_KEY }
    });
    const data = await r.json();
    const photos = data.photos || [];
    if (photos.length > 0) {
      const photo = photos[Math.floor(Math.random()*Math.min(photos.length,6))];
      crossfadeBg(photo.src.large2x || photo.src.original);
    }
  } catch(e) {}
}

function crossfadeBg(url) {
  const next = bgActive === 'a' ? 'b' : 'a';
  const el = document.getElementById(`bg-${next}`);
  el.style.backgroundImage = `url('${url}')`;
  // Crossfade
  document.getElementById(`bg-${bgActive}`).style.opacity = '0';
  el.style.opacity = '1';
  bgActive = next;
}

function getBgQuery(title) {
  const t = title.toLowerCase();
  if (t.includes('cricket')||t.includes('t20')||t.includes('ipl')) return BG_QUERIES.cricket;
  if (t.includes('election')||t.includes('vote')||t.includes('parliament')) return BG_QUERIES.election;
  if (t.includes('space')||t.includes('isro')||t.includes('rocket')) return BG_QUERIES.space;
  if (t.includes('flood')||t.includes('earthquake')||t.includes('disaster')) return BG_QUERIES.disaster;
  if (t.includes('war')||t.includes('military')||t.includes('army')) return BG_QUERIES.military;
  if (t.includes('stock')||t.includes('economy')||t.includes('market')) return BG_QUERIES.economy;
  const defs = BG_QUERIES.default;
  return defs[Math.floor(Math.random()*defs.length)];
}

// ── NEWS ─────────────────────────────────────────────────
function isImportant(title) {
  const t = title.toLowerCase();
  for (const b of BLOCKED) if (t.includes(b)) return false;
  for (const k of IMPORTANT) if (t.includes(k)) return true;
  return false;
}

async function fetchNews() {
  const queries = ['India politics','India breaking news','India cricket','India economy','India government'];
  const pool = []; const seen = new Set();
  for (const q of queries) {
    try {
      const r = await fetch(`https://newsapi.org/v2/everything?q=${encodeURIComponent(q)}&sortBy=publishedAt&apiKey=${NEWS_KEY}&pageSize=20&language=en`);
      const data = await r.json();
      for (const a of (data.articles||[])) {
        let title = (a.title||'').split(' - ')[0].trim();
        const source = a.source?.name || '';
        if (title && title !== '[Removed]' && !seen.has(title) && isImportant(title)) {
          seen.add(title);
          pool.push({ title, source });
        }
      }
    } catch(e) {}
  }
  // RSS fallback
  try {
    const rss = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://news.google.com/rss/search?q=India+breaking&hl=en-IN&gl=IN&ceid=IN:en')}`);
    const text = await rss.text();
    const xml = new DOMParser().parseFromString(text,'text/xml');
    xml.querySelectorAll('item').forEach(item => {
      let title = (item.querySelector('title')?.textContent||'').split(' - ')[0].trim();
      const source = item.querySelector('source')?.textContent || 'Google News';
      if (title && !seen.has(title) && isImportant(title) && title.length > 20) {
        seen.add(title); pool.push({ title, source });
      }
    });
  } catch(e) {}

  if (pool.length > 0) {
    headlines = pool;
    currentIdx = 0;
    document.getElementById('headline-count').textContent = pool.length;
    document.getElementById('refresh-time').textContent =
      new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    showNext();
  }
}

function showNext() {
  if (!headlines.length) return;
  const item = headlines[currentIdx % headlines.length];
  const el = document.getElementById('headline');

  // Fade out
  el.classList.add('hide');
  setTimeout(() => {
    el.textContent = item.title;
    document.getElementById('news-src').textContent = item.source.toUpperCase();
    document.getElementById('counter').textContent =
      `${String((currentIdx%headlines.length)+1).padStart(2,'0')} / ${String(headlines.length).padStart(2,'0')}`;
    el.classList.remove('hide');

    // Background
    setBackground(getBgQuery(item.title));

    // Progress bar
    const prog = document.getElementById('prog');
    prog.style.transition = 'none';
    prog.style.width = '0%';
    setTimeout(() => {
      prog.style.transition = `width ${HEADLINE_DUR}ms linear`;
      prog.style.width = '100%';
    }, 100);

    // Rotate quote every 4 headlines
    if (currentIdx % 4 === 0) {
      document.getElementById('quote').textContent =
        QUOTES[Math.floor(Math.random()*QUOTES.length)];
    }
  }, 600);
  currentIdx++;
}

// ── START ────────────────────────────────────────────────
// Set initial background
setBackground('india golden hour aerial');
fetchNews();
setInterval(fetchNews, FETCH_INT);
setInterval(showNext, HEADLINE_DUR);

// Fullscreen on click
document.addEventListener('click', () => {
  document.documentElement.requestFullscreen?.();
});
</script>
</body>
</html>
