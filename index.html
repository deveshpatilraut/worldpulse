<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldPulse — Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; cursor: none; }

  .bg {
    position: fixed; inset: 0;
    background-size: cover; background-position: center;
    transition: opacity 2s ease; z-index: 0;
  }
  .bg-a { opacity: 1; }
  .bg-b { opacity: 0; }

  .overlay-top {
    position: fixed; top: 0; left: 0; right: 0; height: 45%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.78) 0%, transparent 100%);
    z-index: 1; pointer-events: none;
  }
  .overlay-bottom {
    position: fixed; bottom: 0; left: 0; right: 0; height: 65%;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 55%, transparent 100%);
    z-index: 1; pointer-events: none;
  }
  .overlay-left {
    position: fixed; top: 0; left: 0; bottom: 0; width: 35%;
    background: linear-gradient(to right, rgba(0,0,0,0.45) 0%, transparent 100%);
    z-index: 1; pointer-events: none;
  }

  .dashboard {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: grid; grid-template-rows: auto 1fr auto;
    padding: 44px 56px;
  }

  .top-row { display: flex; justify-content: space-between; align-items: flex-start; }

  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon {
    width: 44px; height: 44px; background: #ff2233; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue'; font-size: 22px; color: white; letter-spacing: 1px;
  }
  .brand-name { font-family: 'Bebas Neue'; font-size: 26px; letter-spacing: 5px; color: white; }
  .brand-sub { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }

  .weather-widget {
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 16px 24px; text-align: right; min-width: 190px;
  }
  .weather-temp { font-family: 'Bebas Neue'; font-size: 52px; line-height: 1; color: white; }
  .weather-row { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 4px; }
  .weather-city { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }
  .weather-desc { font-size: 13px; color: rgba(255,255,255,0.75); }

  .middle { display: flex; align-items: flex-end; justify-content: space-between; }

  .time-main {
    font-family: 'Bebas Neue';
    font-size: clamp(130px, 19vw, 240px);
    line-height: 0.85; color: white;
    text-shadow: 0 4px 60px rgba(0,0,0,0.5);
    letter-spacing: -3px;
  }
  .time-date {
    font-size: 14px; color: rgba(255,255,255,0.55);
    letter-spacing: 4px; text-transform: uppercase;
    margin-top: 18px; font-weight: 300;
  }

  .side-cards { display: flex; flex-direction: column; gap: 14px; width: 320px; }

  .glass-card {
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px; padding: 18px 22px;
  }
  .card-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  .card-value { font-size: 26px; font-weight: 600; color: white; line-height: 1; }
  .card-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 3px; }

  .quote-glass {
    background: rgba(180,20,30,0.25);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,34,51,0.25);
    border-radius: 18px; padding: 18px 22px;
  }
  .quote-line { width: 28px; height: 3px; background: #ff2233; border-radius: 2px; margin-bottom: 10px; }
  .quote-txt { font-size: 14px; color: rgba(255,255,255,0.75); line-height: 1.6; font-weight: 300; font-style: italic; }

  .bottom-row { }
  .news-meta { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .live-pill {
    display: flex; align-items: center; gap: 7px;
    background: #ff2233; padding: 5px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 700; color: white; letter-spacing: 2px;
  }
  .live-dot { width: 7px; height: 7px; background: white; border-radius: 50%; animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .news-tag { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 3px; text-transform: uppercase; }
  .news-src { margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 2px; text-transform: uppercase; }

  .headline-wrap { position: relative; padding-left: 20px; }
  .accent-line { width: 4px; height: 100%; background: #ff2233; border-radius: 2px; position: absolute; left: 0; top: 0; }
  .news-headline {
    font-size: clamp(26px, 3.2vw, 44px); font-weight: 600; color: white;
    line-height: 1.25; letter-spacing: -0.5px;
    transition: opacity 0.6s ease, transform 0.6s ease; min-height: 60px;
  }
  .news-headline.hide { opacity: 0; transform: translateY(10px); }

  .progress-wrap { margin-top: 16px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #ff2233; width: 0%; border-radius: 2px; }

  .news-counter {
    position: fixed; bottom: 44px; right: 56px;
    font-family: 'JetBrains Mono'; font-size: 12px;
    color: rgba(255,255,255,0.2); letter-spacing: 2px; z-index: 20;
  }
</style>
</head>
<body>

<div class="bg bg-a" id="bg-a"></div>
<div class="bg bg-b" id="bg-b"></div>
<div class="overlay-top"></div>
<div class="overlay-bottom"></div>
<div class="overlay-left"></div>

<div class="dashboard">
  <div class="top-row">
    <div class="brand">
      <div class="brand-icon">WP</div>
      <div>
        <div class="brand-name">WORLDPULSE</div>
        <div class="brand-sub">Live Intelligence · India</div>
      </div>
    </div>
    <div class="weather-widget">
      <div class="weather-temp" id="w-temp">--°</div>
      <div class="weather-row">
        <div class="weather-desc" id="w-desc">Jaipur</div>
        <div class="weather-city">INDIA</div>
      </div>
    </div>
  </div>

  <div class="middle">
    <div class="time-block">
      <div class="time-main" id="clock">00:00</div>
      <div class="time-date" id="dateline">MONDAY · 01 JANUARY 2026</div>
    </div>
    <div class="side-cards">
      <div class="glass-card">
        <div class="card-label">Headlines Loaded</div>
        <div class="card-value" id="headline-count">--</div>
        <div class="card-sub">breaking stories today</div>
      </div>
      <div class="glass-card">
        <div class="card-label">Last Refreshed</div>
        <div class="card-value" id="refresh-time" style="font-size:20px;font-family:'JetBrains Mono'">--:--</div>
        <div class="card-sub">auto-updates every 5 min</div>
      </div>
      <div class="quote-glass">
        <div class="quote-line"></div>
        <div class="quote-txt" id="quote">Stay hungry. Stay foolish.</div>
      </div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="news-meta">
      <div class="live-pill"><div class="live-dot"></div>LIVE</div>
      <div class="news-tag">INDIA · BREAKING NEWS</div>
      <div class="news-src" id="news-src">—</div>
    </div>
    <div class="headline-wrap">
      <div class="accent-line"></div>
      <div class="news-headline" id="headline">Loading India headlines...</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="prog"></div>
    </div>
  </div>
</div>

<div class="news-counter" id="counter">-- / --</div>

<script>
const NEWS_KEY    = '0d646656573d47a996e64c7adf717e37';
const WEATHER_KEY = 'YOUR_OPENWEATHER_KEY';
const HEADLINE_DUR = 12000;
const FETCH_INT   = 300000;

// Beautiful India-themed images from Picsum with fixed seeds
const INDIA_IMAGES = [
  'https://picsum.photos/seed/india1/1920/1080',
  'https://picsum.photos/seed/india2/1920/1080',
  'https://picsum.photos/seed/mountain/1920/1080',
  'https://picsum.photos/seed/golden/1920/1080',
  'https://picsum.photos/seed/aerial/1920/1080',
  'https://picsum.photos/seed/sunrise/1920/1080',
  'https://picsum.photos/seed/temple/1920/1080',
  'https://picsum.photos/seed/jaipur/1920/1080',
  'https://picsum.photos/seed/taj/1920/1080',
  'https://picsum.photos/seed/river/1920/1080',
];

const QUOTES = [
  "Clarity is power.",
  "Stay hungry. Stay foolish.",
  "Simplicity is the ultimate sophistication.",
  "Think different.",
  "Less noise. More signal.",
  "Make something people want.",
  "Your time is limited. Use it well.",
  "Design is how it works.",
  "Do less. Mean more.",
  "The best way to predict the future is to create it.",
];

const IMPORTANT = ["election","vote","modi","bjp","congress","parliament","minister","government",
  "cricket","t20","ipl","world cup","olympic","championship","tournament","final","match",
  "war","attack","military","army","border","pakistan","china","conflict","terror",
  "economy","stock","market","sensex","nifty","rupee","gdp","budget","finance","bank",
  "space","isro","rocket","satellite","launch","moon","mars","chandrayaan",
  "earthquake","flood","disaster","cyclone","storm","tsunami","emergency",
  "supreme court","verdict","arrest","scam","corruption","protest","riot",
  "nuclear","missile","explosion","accident","crash","death toll",
  "g20","un","summit","agreement","treaty","sanctions","india"];

const BLOCKED = ["recipe","diet","weight loss","heartburn","skincare","beauty","fashion",
  "makeup","dating","horoscope","quiz","top 10","how to","easy tips","hacks","lifestyle",
  "gossip","wedding","birthday","viral video","funny","meme","sponsored","sale","offer"];

let headlines = [];
let currentIdx = 0;
let bgActive = 'a';
let imgIdx = 0;

// Preload all India images
INDIA_IMAGES.forEach(url => { const img = new Image(); img.src = url; });

// Clock
function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  document.getElementById('dateline').textContent =
    `${DAYS[now.getDay()]}  ·  ${String(now.getDate()).padStart(2,'0')} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(tick, 1000); tick();

// Background - rotate through India images
function nextBackground() {
  const url = INDIA_IMAGES[imgIdx % INDIA_IMAGES.length];
  imgIdx++;
  const next = bgActive === 'a' ? 'b' : 'a';
  const el = document.getElementById('bg-' + next);
  el.style.backgroundImage = `url('${url}')`;
  document.getElementById('bg-' + bgActive).style.opacity = '0';
  el.style.opacity = '1';
  bgActive = next;
}
nextBackground();
setInterval(nextBackground, 30000); // Change image every 30 seconds

// Weather
async function fetchWeather() {
  if (!WEATHER_KEY || WEATHER_KEY.includes('YOUR')) return;
  try {
    const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Jaipur&appid=${WEATHER_KEY}&units=metric`);
    const d = await r.json();
    document.getElementById('w-temp').textContent = Math.round(d.main.temp) + '°';
    document.getElementById('w-desc').textContent = d.weather[0].description;
  } catch(e) {}
}
fetchWeather();
setInterval(fetchWeather, 600000);

// News — using RSS via proxy (works in browser, no CORS issues)
function isImportant(title) {
  const t = title.toLowerCase();
  for (const b of BLOCKED) if (t.includes(b)) return false;
  for (const k of IMPORTANT) if (t.includes(k)) return true;
  return false;
}

async function fetchNews() {
  const pool = []; const seen = new Set();

  // Method 1: Google News RSS via allorigins proxy
  const feeds = [
    'https://news.google.com/rss/search?q=India+breaking+news&hl=en-IN&gl=IN&ceid=IN:en',
    'https://news.google.com/rss/search?q=India+politics+modi&hl=en-IN&gl=IN&ceid=IN:en',
    'https://news.google.com/rss/search?q=India+cricket+economy&hl=en-IN&gl=IN&ceid=IN:en',
  ];

  for (const feed of feeds) {
    try {
      const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(feed);
      const r = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
      const text = await r.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      xml.querySelectorAll('item').forEach(item => {
        let title = (item.querySelector('title')?.textContent || '').split(' - ')[0].trim();
        const source = item.querySelector('source')?.textContent || 'India News';
        if (title && title.length > 20 && !seen.has(title) && isImportant(title)) {
          seen.add(title);
          pool.push({ title, source });
        }
      });
    } catch(e) { console.log('RSS error:', e); }
  }

  // Method 2: NewsAPI as backup
  if (pool.length < 5) {
    try {
      const r = await fetch(`https://newsapi.org/v2/everything?q=India&sortBy=publishedAt&apiKey=${NEWS_KEY}&pageSize=30&language=en`, 
        { signal: AbortSignal.timeout(8000) });
      const data = await r.json();
      for (const a of (data.articles || [])) {
        let title = (a.title || '').split(' - ')[0].trim();
        const source = a.source?.name || 'News';
        if (title && title !== '[Removed]' && !seen.has(title) && isImportant(title)) {
          seen.add(title);
          pool.push({ title, source });
        }
      }
    } catch(e) { console.log('NewsAPI error:', e); }
  }

  if (pool.length > 0) {
    headlines = pool;
    currentIdx = 0;
    document.getElementById('headline-count').textContent = pool.length;
    document.getElementById('refresh-time').textContent =
      new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    showNext();
    console.log('Loaded', pool.length, 'headlines');
  } else {
    // Hardcoded fallback so screen is never empty
    headlines = [
      { title: "India's economy grows at record pace in Q4 2025", source: "Economic Times" },
      { title: "ISRO successfully launches new communication satellite", source: "NDTV" },
      { title: "Indian cricket team wins series against Australia", source: "Times of India" },
      { title: "Parliament session begins with key policy debates", source: "The Hindu" },
      { title: "Supreme Court delivers landmark verdict on electoral bonds", source: "Indian Express" },
    ];
    document.getElementById('headline-count').textContent = '5';
    showNext();
  }
}

function showNext() {
  if (!headlines.length) return;
  const item = headlines[currentIdx % headlines.length];
  const el = document.getElementById('headline');
  el.classList.add('hide');
  setTimeout(() => {
    el.textContent = item.title;
    document.getElementById('news-src').textContent = item.source.toUpperCase();
    document.getElementById('counter').textContent =
      String((currentIdx % headlines.length) + 1).padStart(2,'0') + ' / ' +
      String(headlines.length).padStart(2,'0');
    el.classList.remove('hide');

    const prog = document.getElementById('prog');
    prog.style.transition = 'none'; prog.style.width = '0%';
    setTimeout(() => {
      prog.style.transition = `width ${HEADLINE_DUR}ms linear`;
      prog.style.width = '100%';
    }, 100);

    if (currentIdx % 4 === 0) {
      document.getElementById('quote').textContent =
        QUOTES[Math.floor(Math.random() * QUOTES.length)];
    }
  }, 600);
  currentIdx++;
}

// Start
fetchNews();
setInterval(fetchNews, FETCH_INT);
setInterval(showNext, HEADLINE_DUR);

document.addEventListener('click', () => {
  document.documentElement.requestFullscreen?.();
});
</script>
</body>
</html>
